services:
  - type: web
    name: aeo-scope
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      npm install -g pnpm &&
      pnpm install --no-frozen-lockfile &&
      pnpm --filter @workspace/aeo-dashboard run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: NODE_ENV=production node artifacts/api-server/dist/index.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: aeo-postgres
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: aeo-postgres
    databaseName: aeo
    user: aeo
    plan: free
    region: oregon
